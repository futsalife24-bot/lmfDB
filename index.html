<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>LINEモンスターファーム 能力データベース</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --bg:#0b0a14;
  --fz:1;--s1:#16142a;--s2:#1e1c34;
  --bd:#302c55;--bd2:#3d3870;
  --tx:#e2dfff;--tm:#8b85b0;--ts:#4e4875;
  --red:#ff5277;--blue:#38b6ff;--green:#3ddd7a;
  --purple:#c75fff;--orange:#ffaa2c;--teal:#00d4c8;
  --acc:#e8a020;--acc2:#c75fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{touch-action:manipulation}
body.font-large .card-head-name{font-size:16px!important}
body.font-large .card-head-card{font-size:12px!important}
body.font-large .src-badge{font-size:11px!important}
body.font-large .card-body,.font-large .cd{font-size:14px!important}
body.font-large .chip{font-size:12px!important}
body.font-large .tb{font-size:13px!important}
body.font-large .ftag{font-size:14px!important}
body.font-large .cblbl{font-size:14px!important}
body.font-large .sbar-myset-btn,.font-large .sbar-cnt{font-size:13px!important}
body.font-large .owned-cycle-btn,.font-large .src-toggle-btn,.font-large .filter-toggle-btn{font-size:13px!important}
body.font-large .h-title{font-size:17px!important}
body.font-large .ptab{font-size:14px!important}
body.font-large .active-fbadge{font-size:13px!important}
body.font-large input[type=text]{font-size:15px!important}
body.font-large .myset-title-input{font-size:18px!important}
body.font-large .myset-set-tab{font-size:14px!important}
body.font-large .myset-ability-name{font-size:14px!important}
body.font-large .myset-card-label{font-size:13px!important}
body.font-large .myset-section-title{font-size:15px!important}
body.font-large .flash-title{font-size:15px!important}
body.font-large .myset-memo{font-size:14px!important}
body.font-large .deck-slot-card{font-size:13px!important}
body.font-large .deck-slot-label{font-size:11px!important}
body.font-large .deck-slot-owned,.font-large .deck-slot-cnt{font-size:11px!important}
body.font-large .owned-card-name{font-size:15px!important}
body.font-large .owned-card-count{font-size:12px!important}
body.font-large .owned-card-mark{font-size:18px!important}
body.font-large #owned-stats{font-size:14px!important}
body.font-large .card-sel-title{font-size:16px!important}
body.font-large .card-sel-card-name{font-size:15px!important}
body.font-large .card-sel-place-btn,.font-large .card-sel-plain-btn{font-size:14px!important}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(199,95,255,.12),transparent 60%),
  radial-gradient(ellipse 50% 40% at 95% 90%,rgba(232,160,32,.07),transparent 50%)}

/* HEADER */
header{padding:8px 12px 0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:25;background:rgba(11,10,20,.97);backdrop-filter:blur(14px)}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--acc2),transparent)}
.h-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:14px;letter-spacing:.04em;
  background:linear-gradient(135deg,var(--acc) 20%,var(--acc2) 80%);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PAGE TABS */
.page-tabs{display:flex;border-bottom:1px solid var(--bd)}
.ptab{flex:2;padding:9px 4px;background:none;border:none;border-bottom:3px solid transparent;
  color:var(--tm);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:4px}
.ptab:hover{color:var(--tx)}
.ptab.on{color:var(--tx);border-bottom-color:var(--acc2)}
.ptab.myset-tab.on{border-bottom-color:#f9a825}
.ptab.myset-tab.on .badge{background:#f9a825;color:#111}
.badge{border-radius:9px;padding:1px 6px;font-size:10px;font-weight:700}
.ptab.on .badge{background:var(--acc2);color:#fff}
.ptab:not(.on) .badge{background:var(--s2);color:var(--tm)}

/* PAGE */
.page{display:none}.page.on{display:block}

/* CONTROLS */
.ctrl{position:sticky;top:0;background:rgba(11,10,20,.97);backdrop-filter:blur(14px);
  z-index:20;padding:8px 12px 6px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:var(--header-h,60px)}
.search-row{position:relative}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ts);pointer-events:none}
input[type=text]{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:9px 10px 9px 33px;color:var(--tx);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(199,95,255,.1)}
input::placeholder{color:var(--ts)}

.fscroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}

/* 絞り込みプルダウン */
.filter-toggle-btn{display:flex;align-items:center;gap:5px;
  background:rgba(199,95,255,.12);border:1px solid rgba(199,95,255,.5);
  border-radius:8px;padding:5px 11px;color:#c084fc;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-toggle-btn:hover{background:rgba(199,95,255,.22);color:#d8a4ff}
.filter-toggle-btn.active{background:rgba(199,95,255,.25);border-color:#c75fff;color:#e0b0ff}
.filter-active-dot{width:6px;height:6px;border-radius:50%;background:#c75fff;display:none}
.filter-toggle-btn.has-filter .filter-active-dot{display:block}
.cbrows-wrap{display:none;padding:6px 0 2px}
.cbrows-wrap.open{display:block}
.fscroll::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:4px 10px;border-radius:16px;border:1px solid var(--bd);background:var(--s1);
  color:var(--tm);font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tb:hover{border-color:var(--acc2);color:var(--tx)}
.tb.on{border-color:transparent;color:#fff;font-weight:700}
.tb[data-g=all].on{background:linear-gradient(135deg,var(--acc2),var(--acc))}
.tb[data-g=追撃連撃].on{background:#ff5277}
.tb[data-g=シールド].on{background:#00d4c8}.tb[data-g=被ダメ軽減].on{background:#38b6ff}
.tb[data-g=攻撃強化].on{background:#ffaa2c}.tb[data-g=クリティカル].on{background:#ffcd2e;color:#222!important}
.tb[data-g=必中].on{background:#ff3d8e}.tb[data-g=ガッツ変化系].on{background:#3ddd7a;color:#111!important}
.tb[data-g=無効化].on{background:#607d8b}
.tb[data-g=回避].on{background:#26a69a}.tb[data-g=命中強化].on{background:#8d6e63}
.tb[data-g=所持カード].on{background:#43a047;color:#fff}

.cbrow{display:flex;flex-wrap:wrap;gap:4px 9px;align-items:center}
.cblbl{font-size:12px;color:var(--tm);flex-shrink:0;font-weight:700}
.ftag-group{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.ftag{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;
  padding:4px 10px;font-size:12px;color:var(--tm);font-family:inherit;cursor:pointer;
  transition:all .15s;white-space:nowrap;font-weight:700}
.ftag:hover{border-color:var(--acc2);color:var(--tx)}
.ftag.on{background:rgba(199,95,255,.18);border-color:#c75fff;color:#e0b0ff}
/* アクティブフィルターバッジ */
.active-filter-bar{display:none;flex-wrap:wrap;gap:4px;padding:4px 12px 0}
.active-filter-bar.visible{display:flex}
.active-fbadge{display:inline-flex;align-items:center;gap:4px;
  background:rgba(199,95,255,.18);border:1px solid rgba(199,95,255,.5);
  border-radius:12px;padding:2px 8px;font-size:11px;color:#e0b0ff;font-weight:700}
.active-fbadge-x{background:none;border:none;color:rgba(220,160,255,.7);
  cursor:pointer;font-size:12px;line-height:1;padding:0 0 0 2px}
.active-fbadge-x:hover{color:#ff5277}
.cbl input[type=checkbox]{appearance:none;width:13px;height:13px;border:1.5px solid var(--bd2);
  border-radius:3px;background:var(--s1);cursor:pointer;position:relative;transition:all .15s;flex-shrink:0;padding:0}
.cbl input[type=checkbox]:checked{background:var(--acc2);border-color:var(--acc2)}
.cbl input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:1px;font-size:9px;color:#fff;font-weight:700}
.cbl:hover{color:var(--tx)}

.sbar{padding:6px 14px;display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--tm);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);
  position:sticky;top:var(--ctrl-h,0);background:rgba(11,10,20,.97);backdrop-filter:blur(14px);z-index:19}
.toggle-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.toggle-wrap input[type=checkbox]{display:none}
.toggle-track{width:32px;height:18px;background:var(--bd2);border-radius:9px;position:relative;
  transition:background .2s;flex-shrink:0}
.toggle-wrap input:checked + .toggle-track{background:var(--acc2)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;
  border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle-wrap input:checked + .toggle-track .toggle-thumb{transform:translateX(14px)}
.toggle-label{font-size:10px;color:var(--tm);white-space:nowrap}
.sbar-cnt{font-weight:700;color:var(--tx);font-size:12px}
.card-sel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:250;align-items:flex-end;justify-content:center}
.card-sel-overlay.open{display:flex}
.card-sel-box{background:var(--s1);border:1px solid var(--bd2);border-radius:16px 16px 0 0;
  width:100%;max-width:600px;padding:14px 14px 32px;max-height:80vh;overflow-y:auto}
.card-sel-title{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:13px;
  color:var(--tx);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.card-sel-item{padding:10px 4px;border-bottom:1px solid var(--bd);cursor:pointer}
.card-sel-item:last-child{border-bottom:none}
.card-sel-item:hover{background:var(--s2)}
.card-sel-card-name{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:13px;
  margin-bottom:6px}
.card-sel-place-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.card-sel-place-btn{background:var(--s2);border:1px solid var(--bd2);border-radius:7px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s}
.card-sel-place-btn:hover{border-color:var(--acc2);color:var(--acc2)}
.card-sel-place-btn.flash-btn{border-color:rgba(255,205,0,.4);color:#ffd54f;background:rgba(255,205,0,.08)}
.card-sel-place-btn.deck-btn{border-color:rgba(99,179,237,.4);color:#63b3ed;background:rgba(99,179,237,.08)}
.card-sel-place-btn.both-btn{border-color:rgba(154,117,255,.4);color:#c084fc;background:rgba(154,117,255,.08)}
.card-sel-plain-btn{background:var(--s2);border:1px solid var(--bd2);border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  color:var(--tx);transition:all .15s;display:block;width:100%;text-align:left;margin-top:4px}
.card-sel-plain-btn:hover{border-color:var(--acc2)}
.owned-cycle-btn{background:var(--s2);border:1px solid var(--bd2);border-radius:7px;
  padding:5px 9px;color:var(--tm);font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.owned-cycle-btn.mode-owned{border-color:rgba(67,160,71,.5);background:rgba(67,160,71,.12);color:#43a047}
.owned-cycle-btn.mode-unowned{border-color:rgba(255,82,119,.4);background:rgba(255,82,119,.08);color:#ff5277}
.src-toggle-btn{background:var(--s2);border:1px solid var(--bd2);border-radius:7px;
  padding:4px 9px;color:var(--tm);font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.src-toggle-btn.on{border-color:rgba(99,179,237,.6);background:rgba(99,179,237,.15);color:#63b3ed}
.src-toggle-btn.on[data-src="閃き"]{border-color:rgba(255,205,0,.6);background:rgba(255,205,0,.12);color:#ffd54f}
.src-toggle-btn.on[data-src="EXトレ"]{border-color:rgba(154,117,255,.6);background:rgba(154,117,255,.12);color:#c084fc}
.src-badges{display:inline-block;flex-shrink:0;position:relative;vertical-align:middle}
.src-badges .src-badge{display:block}
.src-badges.multi{overflow:hidden}
.src-badges.multi .src-badge:nth-child(1){animation:badge-fade-a 3s infinite}
.src-badges.multi .src-badge:nth-child(2){position:absolute;top:0;left:0;animation:badge-fade-b 3s infinite}
@keyframes badge-fade-a{0%,35%{opacity:1}50%,85%{opacity:0}100%{opacity:1}}
@keyframes badge-fade-b{0%,35%{opacity:0}50%,85%{opacity:1}100%{opacity:0}}
.src-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;
  flex-shrink:0;white-space:nowrap}
.src-badge.イベント{background:rgba(99,179,237,.15);border:1px solid rgba(99,179,237,.4);color:#63b3ed}
.src-badge.閃き{background:rgba(255,205,0,.15);border:1px solid rgba(255,205,0,.4);color:#ffd54f}
.src-badge.EXトレ{background:rgba(154,117,255,.15);border:1px solid rgba(154,117,255,.4);color:#c084fc}
.card-head-card{font-size:10px;flex-shrink:0;cursor:pointer;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:90px}
.card-head-card.owned{color:#43a047}
.dup-badge{background:rgba(199,95,255,.15);border:1px solid rgba(199,95,255,.4);
  color:#c084fc;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700}
/* データ管理ボタン */
.warn-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px}
.warn-overlay.open{display:flex}
.warn-box{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:20px 18px;width:100%;max-width:340px}
.warn-icon{font-size:28px;text-align:center;margin-bottom:8px}
.warn-msg{font-size:13px;line-height:1.7;color:var(--tx);margin-bottom:16px;text-align:center}
.warn-btns{display:flex;gap:8px}
.warn-btn{flex:1;padding:9px;border-radius:9px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.warn-btn.cancel{background:var(--s2);border:1px solid var(--bd2);color:var(--tm)}
.warn-btn.ok{background:linear-gradient(135deg,#ff7043,#f9a825);color:#fff}
.data-fab{position:static;
  background:var(--s2);border:1px solid var(--bd2);border-radius:8px;
  padding:5px 10px;color:var(--tm);font-family:inherit;font-size:12px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.4)}
.data-fab:hover{border-color:var(--acc2);color:var(--tx);background:var(--s1)}
.data-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:flex-end;justify-content:center}
.data-modal-overlay.open{display:flex}
.data-modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px 16px 0 0;
  width:100%;max-width:600px;padding:18px 16px 32px}
.data-modal-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:14px;
  margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.data-modal-close{background:none;border:none;color:var(--tm);font-size:20px;cursor:pointer}
.data-modal-close:hover{color:var(--tx)}
.data-section{margin-bottom:16px}
.data-section-title{font-size:11px;color:var(--ts);font-weight:700;letter-spacing:.06em;margin-bottom:6px}
.data-textarea{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;
  padding:8px 10px;color:var(--tx);font-family:monospace;font-size:11px;outline:none;
  resize:none;height:80px;line-height:1.4;transition:border-color .2s}
.data-textarea:focus{border-color:var(--acc2)}
.data-row{display:flex;gap:8px;margin-top:6px}
.data-action-btn{flex:1;padding:9px;border-radius:9px;border:none;font-family:inherit;
  font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.data-action-btn:hover{opacity:.85}
.data-action-btn.export{background:var(--s2);border:1px solid var(--bd2);color:var(--tm)}
.data-action-btn.import{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff}
.data-action-btn.copy{background:var(--s2);border:1px solid var(--bd2);color:var(--tm)}
.data-hint{font-size:10px;color:var(--ts);margin-top:5px;line-height:1.5}
/* sbar セットボタン */
.sbar-myset-btn{display:flex;align-items:center;gap:3px;background:rgba(249,168,37,.08);
  border:1px solid rgba(249,168,37,.3);border-radius:7px;padding:2px 8px;
  color:#f9a825;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  max-width:130px;overflow:hidden;font-family:inherit;transition:background .15s}
.sbar-myset-btn:hover{background:rgba(249,168,37,.18)}
.sbar-myset-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
/* セット選択ピッカー */
.set-picker{position:absolute;left:12px;z-index:50;background:var(--s1);
  border:1px solid var(--bd2);border-radius:11px;min-width:180px;max-width:260px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);overflow:hidden;display:none}
.set-picker.open{display:block}
.set-picker-head{padding:8px 12px 6px;font-size:10px;color:var(--ts);font-weight:700;
  letter-spacing:.06em;border-bottom:1px solid var(--bd)}
.set-picker-item{padding:9px 13px;font-size:12px;cursor:pointer;display:flex;
  align-items:center;gap:8px;transition:background .12s;border-bottom:1px solid var(--bd)}
.set-picker-item:last-of-type{border-bottom:none}
.set-picker-item:hover{background:var(--s2)}
.set-picker-item.active{color:#f9a825;font-weight:700}
.set-picker-dot{width:7px;height:7px;border-radius:50%;background:var(--bd2);flex-shrink:0}
.set-picker-item.active .set-picker-dot{background:#f9a825}
.set-picker-new{padding:8px 13px;font-size:11px;color:var(--ts);cursor:pointer;
  display:flex;align-items:center;gap:6px;border-top:1px solid var(--bd);transition:background .12s}
.set-picker-new:hover{color:#f9a825;background:var(--s2)}
/* カードチェックボックス */
.card-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--bd2);
  background:var(--s2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:11px;transition:all .15s;user-select:none}
.card-check.in{background:#f9a825;border-color:#f9a825;color:#111;font-weight:700}
.card-check:hover{border-color:#f9a825}
/* マイセットページ */
.myset-page-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--tab-h,48px));overflow:hidden}
.myset-tabbar-wrap{display:flex;align-items:center;gap:4px;padding:8px 12px 0;
  border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.myset-tabbar{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none}
.myset-tabbar::-webkit-scrollbar{display:none}
.myset-set-tab{padding:5px 12px;border-radius:8px 8px 0 0;border:1px solid transparent;
  border-bottom:none;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;color:var(--tm);background:none;white-space:nowrap;
  transition:all .15s;margin-bottom:-1px;font-family:inherit}
.myset-set-tab:hover{background:var(--s2);color:var(--tx)}
.myset-set-tab.active{background:var(--bg);border-color:var(--bd);border-bottom-color:var(--bg);color:#f9a825}
.myset-new-btn{background:none;border:1px solid rgba(249,168,37,.4);border-radius:7px;
  padding:3px 10px;color:#f9a825;font-size:15px;font-weight:700;cursor:pointer;
  flex-shrink:0;margin-bottom:1px;transition:background .15s;font-family:inherit}

};
// ローカルストレージの上書きデータをマージ
const overrides = JSON.parse(localStorage.getItem('mf_overrides')||'{}');
const abilities = ABILITIES.map(a => {
  const fix = DATA_FIXES[a.id] || {};
  return overrides[a.id] ? {...a, ...fix, ...overrides[a.id]} : {...a, ...fix};
});

let ownedCards = new Set(JSON.parse(localStorage.getItem('mf_owned')||'[]'));
function saveOwned(){ localStorage.setItem('mf_owned', JSON.stringify([...ownedCards])) }

function saveOverrides(){ localStorage.setItem('mf_overrides', JSON.stringify(overrides)) }

// 全能力のsource一覧をグローバルに構築（フィルターに依存しない）
const srcsByName={};
for(const a of abilities){
  if(!srcsByName[a.name]) srcsByName[a.name]=[];
  const srcs=a.sources||[a.source||'イベント'];
  srcs.forEach(s=>{ if(!srcsByName[a.name].includes(s)) srcsByName[a.name].push(s); });
}
function srcBadgesHtml(a){
  const order=['イベント','閃き','EXトレ'];
  const srcs=(srcsByName[a.name]||[a.source||'イベント']).slice().sort((x,y)=>order.indexOf(x)-order.indexOf(y));
  const labels={'イベント':'イベ','EXトレ':'EX'};
  const badges=srcs.map(s=>`<span class="src-badge ${s}">${labels[s]||s}</span>`).join('');
  const multiClass=srcs.length>1?' multi':'';
  return `<div class="src-badges${multiClass}">${badges}</div>`;
}

let activeTags=new Set(), activeCbs=new Set(), activeSrcs=new Set(), ownerFilter='all', q='', activePage='db';
// マイセット state
let mySets = JSON.parse(localStorage.getItem('mf_sets')||'[]');
let activeSetId = mySets.length ? mySets[0].id : null;
function saveSets(){ localStorage.setItem('mf_sets', JSON.stringify(mySets)); }
function getActiveSet(){ return mySets.find(s=>s.id===activeSetId)||null; }
function getActiveItems(){ const s=getActiveSet(); return s ? new Set(s.items) : new Set(); }
let expandAll = localStorage.getItem('mf_expand')==='1';

// ===== PAGE SWITCH =====
document.querySelectorAll('.ptab').forEach(tab=>{

    // owned-fabのハイライト解除
    const fab=document.getElementById('owned-fab');
    if(fab){ fab.style.color=''; fab.style.borderColor=''; fab.style.background=''; }
    activePage=tab.dataset.page;
    document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
    tab.classList.add('on');

    if(activePage==='myset') renderMyset();

// ===== UTILS =====
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function descHtml(raw){
  return String(raw)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/＜([^＞]+)＞/g,'<b>＜$1＞</b>')
    .replace(/\[([^\]]+)\]/g,'<span style="color:#8b85b0">[$1]</span>')
    .replace(/【([^】]+)】/g,'<span style="color:#38b6ff">【$1】</span>')
    .replace(/&lt;br&gt;/g,'<br>');
}

// ===== FILTER =====
function getFiltered(){
  return abilities.filter(a=>{
    if(q){
      const lq=q.toLowerCase();
      if(!a.name.toLowerCase().includes(lq)&&!a.desc.toLowerCase().includes(lq)&&!a.card.toLowerCase().includes(lq)) return false;
    }
    if(ownerFilter==='owned' && !ownedCards.has(a.card)) return false;
    if(ownerFilter==='unowned' && ownedCards.has(a.card)) return false;
    for(const f of activeCbs){
      if(f==='追撃連撃'){ if(!a.tags.includes('追撃')&&!a.tags.includes('連撃')) return false; }
      else if(f==='ガッツ変化系'){ if(!a.tags.includes('ガッツ回復')) return false; }
      else { if(!a.tags.includes(f)) return false; }
    }
    if(activeSrcs.size>0){
      const srcs=a.sources||[a.source||'イベント'];
      if(!srcs.some(s=>activeSrcs.has(s))) return false;
    }
    return true;
  });
}

  // myset-tab-cnt removed
  const grid=document.getElementById('grid');
  if(!items.length){
    grid.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">条件に一致する能力が見つかりませんでした</div></div>';
    return;
  }
  // ===== 白金グループ化 =====
  // tier判定: 序・破・急は'none'、II/IV→gold、I/III→white、その他→none

  function getTier(name){
    if(name.startsWith('超')) return 'rainbow';
    if(/・序$|・破$|・急$/.test(name)) return 'gold';
    if(/ II$| IV$/.test(name)) return 'gold';
    if(/ I$| III$/.test(name)) return 'white';
    return 'none';
  }
  // ベース名（末尾のI/II/III/IVを除去）
  function getBaseName(name){
    return name.replace(/ I$/, '').replace(/ II$/, '').replace(/ III$/, '').replace(/ IV$/, '');
  }
  // 折りたたみ時: 「能力名（I, II）」「能力名（III, IV）」形式
  function collapsedName(gold, whites){
    const base = getBaseName(gold.name);
    const goldRank = gold.name.replace(base, '').trim();   // II or IV
    const whiteRanks = whites.map(w=>w.name.replace(base,'').trim()).join(', '); // I or III
    const rankStr = whiteRanks ? whiteRanks + ', ' + goldRank : goldRank;
    return esc(base) + '<span style="font-size:10px;color:var(--tm);margin-left:3px">（' + rankStr + '）</span>';
  }
  // カードHTML生成（単体用）
  function cardHtml(a, tier, extraClass=''){
    const ownedCard=ownedCards.has(a.card);
    const chips=a.tags.map(t=>`<span class="chip ${t}">${t}</span>`).join('');
    const openClass = expandAll ? ' open' : '';
    const inSet=getActiveItems().has(a.id);
    return `<div class="card${tier!=='none'?' tier-'+tier:''}${openClass}${extraClass}" data-id="${a.id}">
      <div class="card-head">
        <div class="card-check${inSet?' in':''}" data-chk="${a.id}">${inSet?'✓':''}</div>
        ${srcBadgesHtml(a)}
        <div class="card-head-name">${esc(a.name)}</div>
        <div class="card-head-card ${ownedCard?'owned':''}" data-card="${esc(a.card)}">${dupCountMap[a.name]>1?'<span class=\'dup-badge\'>×'+dupCountMap[a.name]+'</span>':(ownedCard?'✅':'📛')+esc(a.card)}</div>
      </div>
      <div class="card-body">
        <div class="cd">${descHtml(a.desc)}</div>
      </div>
    </div>`;
  }

  // 同名能力の重複カウント（render内はitems不使用のdupCountMapのみ）
  const dupCountMap={};
  const dupIdsMap={};
  for(const a of abilities){
    if(!dupCountMap[a.name]){ dupCountMap[a.name]=0; dupIdsMap[a.name]=[]; }
    dupCountMap[a.name]++;
    dupIdsMap[a.name].push(a.id);
  }

  const seenNames=new Set();
  const dedupedItems=items.filter(a=>{ if(seenNames.has(a.name)) return false; seenNames.add(a.name); return true; });

  const goldItems  = dedupedItems.filter(a=>getTier(a.name)==='gold');
  const whiteItems = dedupedItems.filter(a=>getTier(a.name)==='white');
  const rainbowItems = dedupedItems.filter(a=>getTier(a.name)==='rainbow');
  const noneItems  = dedupedItems.filter(a=>getTier(a.name)==='none');
  const usedWhiteIds = new Set();
  const groups = goldItems.map(gold=>{
    const base = getBaseName(gold.name);
    const whites = whiteItems.filter(w=>getBaseName(w.name)===base && w.card===gold.card && !usedWhiteIds.has(w.id));
    whites.forEach(w=>usedWhiteIds.add(w.id));
    return {gold, whites};
  });
  const soloWhites = whiteItems.filter(w=>!usedWhiteIds.has(w.id));

  const html_parts = [];
  for(const {gold, whites} of groups){
    if(!expandAll){
      // 折りたたみ: 金1枚に「名前（I, II）」を表示、タップで白を展開
      const ownedCard=ownedCards.has(gold.card);
      const chips=gold.tags.map(t=>`<span class="chip ${t}">${t}</span>`).join('');
      const nameStr = collapsedName(gold, whites);
      const goldInSet=getActiveItems().has(gold.id);
      // 白カードHTML（非表示の入れ子）
      const whitesHtml = whites.map(w=>{
        const wOwned=ownedCards.has(w.card);
        const wChips=w.tags.map(t=>`<span class="chip ${t}">${t}</span>`).join('');
        const wInSet=getActiveItems().has(w.id);
        return `<div class="card tier-white sub-card" data-id="${w.id}">
          <div class="card-head" style="padding-left:20px">
            <div class="card-check${wInSet?' in':''}" data-chk="${w.id}">${wInSet?'✓':''}</div>
            ${srcBadgesHtml(w)}
            <div class="card-head-name" style="font-size:12px">┗ ${esc(w.name)}</div>
            <div class="card-head-card ${wOwned?'owned':''}" data-card="${esc(w.card)}">${dupCountMap[w.name]>1?'<span class=\'dup-badge\'>×'+dupCountMap[w.name]+'</span>':(wOwned?'✅':'📛')+esc(w.card)}</div>
          </div>
          <div class="card-body">
            <div class="ct">${wChips}</div>
            <div class="cd">${descHtml(w.desc)}</div>
          </div>
        </div>`;
      }).join('');
      html_parts.push(`<div class="ability-group-wrap" data-gold-id="${gold.id}">
        <div class="card tier-gold" data-id="${gold.id}">
          <div class="card-head">
            <div class="card-check${goldInSet?' in':''}" data-chk="${gold.id}">${goldInSet?'✓':''}</div>
            ${srcBadgesHtml(gold)}
            <div class="card-head-name">${nameStr}</div>
            <div class="card-head-card ${ownedCard?'owned':''}" data-card="${esc(gold.card)}">${dupCountMap[gold.name]>1?'<span class=\'dup-badge\'>×'+dupCountMap[gold.name]+'</span>':(ownedCard?'✅':'📛')+esc(gold.card)}</div>
          </div>
          <div class="card-body">
            <div class="ct">${chips}</div>
            <div class="cd">${descHtml(gold.desc)}</div>
          </div>
        </div>
        <div class="sub-cards" style="display:none">${whitesHtml}</div>
      </div>`);
    } else {
      // 常時展開: 金→白をグループで
      html_parts.push(`<div class="ability-group">`);
      html_parts.push(cardHtml(gold, 'gold'));
      for(const w of whites) html_parts.push(cardHtml(w, 'white', ' sub-card'));
      html_parts.push(`</div>`);
    }
  }
  for(const w of soloWhites) html_parts.push(cardHtml(w, 'white'));
  for(const n of noneItems)  html_parts.push(cardHtml(n, 'none'));
  for(const r of rainbowItems) html_parts.push(cardHtml(r, 'rainbow'));
  grid.innerHTML = html_parts.join('');

  // 折りたたみ: カードタップで説明文＋白カードを展開
  grid.querySelectorAll('.ability-group-wrap').forEach(wrap=>{
    const goldCard = wrap.querySelector('.card.tier-gold');
    const subCards = wrap.querySelector('.sub-cards');
    goldCard.querySelector('.card-head').addEventListener('click', e=>{
      if(e.target.closest('[data-card]')||e.target.closest('.card-check')) return;
      const isOpen = goldCard.classList.toggle('open');
      if(subCards) subCards.style.display = isOpen ? 'flex' : 'none';
    });
    // sub-cardも個別展開可能
    wrap.querySelectorAll('.sub-card .card-head').forEach(h=>{
      h.addEventListener('click', e=>{
        if(e.target.closest('[data-card]')||e.target.closest('.card-check')) return;
        h.closest('.card').classList.toggle('open');
      });
    });
  });
  // 常時展開 & 単体カードのタップ展開
  grid.querySelectorAll('.card-head').forEach(head=>{
    if(head.closest('.ability-group-wrap')) return; // 上で処理済み
    head.addEventListener('click', e=>{
      if(e.target.closest('[data-card]')||e.target.closest('.card-check')) return;
      head.closest('.card').classList.toggle('open');
    });
  });
  // card-head-card は読み取り専用（所持カードページで管理）
}

// ===== COLLECTION RENDER =====

// ===== MYSET =====
function updateSbarMyset(){
  const s=getActiveSet();
  const btn=document.getElementById('sbar-myset-btn');
  const nm=document.getElementById('sbar-myset-name');
  if(!btn||!nm) return;
  nm.textContent = s ? s.name : 'セットなし';
}

function openSetPicker(){
  const picker=document.getElementById('set-picker');
  if(!picker) return;
  if(mySets.length===0){
    openSetModal(); return;
  }
  picker.innerHTML=
    '<div class="set-picker-head">⭐ セット選択</div>'+
    `<div class="set-picker-item${activeSetId===null?' active':''}" id="picker-none">
      <div class="set-picker-dot"></div>
      <span style="flex:1;color:var(--ts)">選択なし</span>
    </div>`+
    mySets.map(s=>`<div class="set-picker-item${s.id===activeSetId?' active':''}" data-sid="${s.id}">
      <div class="set-picker-dot"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</span>
      <span style="font-size:10px;color:var(--ts)">${s.items.length}</span>
    </div>`).join('')+
    '<div class="set-picker-new" id="picker-new">＋ 新規セット作成</div>';
  picker.classList.add('open');
  picker.querySelector('#picker-none').addEventListener('click',()=>{
    activeSetId=null; saveSets();
    picker.classList.remove('open');
    updateSbarMyset(); render();
  });
  picker.querySelectorAll('.set-picker-item[data-sid]').forEach(el=>{
    el.addEventListener('click',()=>{
      activeSetId=el.dataset.sid; saveSets();
      picker.classList.remove('open');
      updateSbarMyset(); render();
    });
  });
  picker.querySelector('#picker-new').addEventListener('click',()=>{
    picker.classList.remove('open'); openSetModal();
  });
}

function openSetModal(){
  document.getElementById('set-name-input').value='';
  document.getElementById('set-modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('set-name-input').focus(),200);
}

function renderMyset(){
  // myset-tab-cnt removed
  const tabbar=document.getElementById('myset-set-tabs');
  tabbar.innerHTML=mySets.map(s=>`<button class="myset-set-tab${s.id===activeSetId?' active':''}" data-sid="${s.id}">${esc(s.name)}</button>`).join('');
  tabbar.querySelectorAll('.myset-set-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeSetId=btn.dataset.sid; saveSets(); renderMyset(); render(); });
  });
  const pane=document.getElementById('myset-pane');
  const set=getActiveSet();
  if(!set){
    pane.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--ts)"><div style="font-size:32px;margin-bottom:8px">⭐</div><div style="font-size:12px;line-height:1.7">セットがまだありません<br>「＋」ボタンで作成してください</div></div>';
    return;
  }
  // deck: {own:[card|null x5], rental:card|null}
  if(!set.deck) set.deck={own:[null,null,null,null,null],rental:null};

  // flashSettings: {id: "flash"|"deck"|"both"} デフォルトはflash
  if(!set.flashSettings) set.flashSettings={};

  // セットに含まれるカード一覧
  const cardMap={};
  for(const id of set.items){
    const a=abilities.find(x=>x.id===id); if(!a) continue;
    if(!cardMap[a.card]) cardMap[a.card]=[];
    cardMap[a.card].push(a);
  }
  const allCards=Object.keys(cardMap);

  // 編成に入っているカード一覧
  const deckCards=[...set.deck.own, set.deck.rental].filter(Boolean);

  // 閃き能力の配置判定
  function getFlacePlace(a){
    if(a.source!=='閃き') return null; // 閃きでなければnull
    return set.flashSettings[a.id] || 'flash';
  }

  // 編成外カード（ロード閃き枠）= 閃き以外の編成外 or 閃きでflash/both設定
  const flashCards=allCards.filter(c=>!deckCards.includes(c));

  // 編成枠HTML
  function slotHtml(card, idx, isRental){
    const slotClass=`deck-slot${card?' filled':''}${isRental?' rental':''}`;
    const label=isRental?'レンタル':`自前${idx+1}`;
    if(card){
      const own=ownedCards.has(card);
      const cnt=cardMap[card]?cardMap[card].length:0;
      return `<div class="${slotClass}" data-slot="${isRental?'rental':idx}">
        <button class="deck-slot-clear-btn" data-clear="${isRental?'rental':idx}" title="クリア">✕</button>
        <div class="deck-slot-label">${label}</div>
        <div class="deck-slot-card">${esc(card)}</div>
        <div class="deck-slot-owned">${own?'✅所持':'📛未所持'}</div>
        <div class="deck-slot-cnt">能力${cnt}件</div>
      </div>`;
    }
    return `<div class="${slotClass}" data-slot="${isRental?'rental':idx}">
      <div class="deck-slot-label">${label}</div>
      <div class="deck-slot-empty">＋</div>
    </div>`;
  }
  const ownSlots=set.deck.own.map((c,i)=>slotHtml(c,i,false)).join('');
  const rentalSlot=slotHtml(set.deck.rental,0,true);

  // 能力一覧HTML生成
  // 編成カードの能力セクション
  // カード別にグループ化、閃き能力は flashSettings で "deck"/"both" のもののみ含む
  function abilityGroupHtmlFiltered(cards, isFlash){
    if(cards.length===0) return '';
    if(isFlash){
      // ロード閃き枠：カードラベルは全幅、能力は2列グリッド
      const allItems=[];
      cards.forEach(card=>{
        const isInDeck=deckCards.includes(card);
        const abs=(cardMap[card]||[]).filter(a=>{
          const place=getFlacePlace(a);
          if(place===null) return !isInDeck;
          return place==='flash'||place==='both';
        });
        if(abs.length===0) return;
        const own=ownedCards.has(card);
        // カードラベル（全幅）
        allItems.push(`<div class="myset-card-label flash-card-label">${own?'✅':'📛'} ${esc(card)}${own?'<span class="myset-owned-badge">所持済</span>':''}</div>`);
        abs.forEach(a=>{
          const place=getFlacePlace(a);
          const placeLabel=place==='deck'?'編成':place==='flash'?'閃き':'両方';
          const placeBtn=place!==null
            ?`<button class="flash-place-btn" data-id="${a.id}" data-place="${place}">${placeLabel}</button>`:'';
          allItems.push(`<div class="myset-ability-row">
            <button class="ability-info-btn" data-id="${a.id}">?</button>
            <div class="myset-ability-name">${esc(a.name)}</div>
            ${placeBtn}
            <button class="myset-remove-btn" data-id="${a.id}">×</button>
          </div>`);
        });
      });
      return `<div class="myset-ability-grid">${allItems.join('')}</div>`;
    }
    return cards.map(card=>{
      const isInDeck=deckCards.includes(card);
      const abs=(cardMap[card]||[]).filter(a=>{
        const place=getFlacePlace(a);
        if(place===null) return isInDeck;
        return place==='deck'||place==='both';
      });
      if(abs.length===0) return '';
      const own=ownedCards.has(card);
      const rowsHtml=abs.map(a=>{
        const place=getFlacePlace(a);
        const placeLabel=place==='deck'?'編成':place==='flash'?'閃き':'両方';
        const placeBtn=place!==null
          ?`<button class="flash-place-btn" data-id="${a.id}" data-place="${place}">${placeLabel}</button>`:'';
        return `<div class="myset-ability-row">
          <button class="ability-info-btn" data-id="${a.id}">?</button>
          <div class="myset-ability-name">${esc(a.name)}</div>
          ${placeBtn}
          <button class="myset-remove-btn" data-id="${a.id}">×</button>
        </div>`;
      }).join('');
      const rows=`<div class="myset-ability-grid">${rowsHtml}</div>`;
      return `<div class="myset-card-group">
        <div class="myset-card-label">${own?'✅':'📛'} ${esc(card)}${own?'<span class="myset-owned-badge">所持済</span>':''}</div>
        ${rows}
      </div>`;
    }).filter(Boolean).join('');
  }

  // 編成カードの能力（閃きはdeck/both設定のもののみ）
  const deckAbilityCards=deckCards.filter(c=>cardMap[c]);
  const deckAbilityHtml=abilityGroupHtmlFiltered(deckAbilityCards, false);
  // ロード閃き枠（編成外カード＋閃きのflash/both）
  const allFlashCards=[...new Set([...flashCards, ...allCards.filter(c=>
    (cardMap[c]||[]).some(a=>{ const p=getFlacePlace(a); return p==='flash'||p==='both'; })
  )])];
  const flashHtml=abilityGroupHtmlFiltered(allFlashCards, true);
  const flashCount=allFlashCards.reduce((n,c)=>{
    return n+(cardMap[c]||[]).filter(a=>{ const p=getFlacePlace(a); return p==='flash'||p==='both'||(!deckCards.includes(c)&&p===null); }).length;
  },0);

  pane.innerHTML=`
    <div class="myset-header">
      <input class="myset-title-input" id="myset-title-input" value="${esc(set.name)}" placeholder="セット名">
      <button class="myset-del-btn" id="myset-del-btn">🗑️</button>
    </div>
    <textarea class="myset-memo" id="myset-memo" placeholder="メモ（任意）...">${esc(set.memo||'')}</textarea>
    <div class="deck-section">
      <div class="deck-title">🃏 編成カード（タップで設定）</div>
      <div class="deck-slots">${ownSlots}</div>
      <div class="deck-slots" style="grid-template-columns:1fr 1fr 1fr">${rentalSlot}<div></div><div></div></div>
    </div>
    ${set.items.length===0
      ?'<div style="text-align:center;padding:20px;color:var(--ts);font-size:12px">📋 能力DBのチェックボックスから追加してください</div>'
      :`${deckAbilityHtml
          ?`<div class="myset-section-title">📋 編成カードの能力</div>${deckAbilityHtml}`:''}
        ${flashHtml
          ?`<div class="flash-section"><div class="flash-title">💡 ロード閃き枠<span class="myset-count-badge" style="margin-left:7px">計${flashCount}個</span></div>${flashHtml}</div>`
          :''}`}`;

  // 編成枠×ボタン → クリア
  pane.querySelectorAll('.deck-slot-clear-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const key=btn.dataset.clear;
      if(key==='rental') set.deck.rental=null; else set.deck.own[+key]=null;
      saveSets(); renderMyset();
    });
  });

  // 編成枠タップ → カード選択
  pane.querySelectorAll('.deck-slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
      const slotKey=slot.dataset.slot;
      const isRental=slotKey==='rental';
      openCardPicker(allCards, set, slotKey, isRental);
    });
  });

  pane.querySelector('#myset-del-btn').addEventListener('click',()=>{
    if(!confirm(`「${set.name}」を削除しますか？`)) return;
    mySets=mySets.filter(s=>s.id!==set.id);
    if(activeSetId===set.id) activeSetId=mySets.length?mySets[0].id:null;
    saveSets(); renderMyset(); render();
  });
  const memoEl=pane.querySelector('#myset-memo');
  memoEl&&memoEl.addEventListener('input',e=>{ set.memo=e.target.value; saveSets(); });
  const titleInput=pane.querySelector('#myset-title-input');
  titleInput&&titleInput.addEventListener('input',e=>{
    set.name=e.target.value; saveSets();
    // タブバーも更新
    document.querySelectorAll('.myset-set-tab').forEach(btn=>{
      if(btn.dataset.sid===set.id) btn.textContent=e.target.value||'（名前なし）';
    });
  });
  // 閃き配置ボタン
  let flashMenuEl=null;
  function closeFlashMenu(){ if(flashMenuEl){ flashMenuEl.remove(); flashMenuEl=null; } }
  pane.querySelectorAll('.flash-place-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      closeFlashMenu();
      const id=+btn.dataset.id;
      const cur=btn.dataset.place;
      const opts=[
        {v:'deck', l:'📋 編成カードの能力'},
        {v:'flash',l:'💡 ロード閃き枠'},
        {v:'both', l:'📋💡 両方に表示'},
      ];
      const menu=document.createElement('div');
      menu.className='flash-place-menu';
      menu.innerHTML=opts.map(o=>`<div class="flash-place-item${o.v===cur?' active':''}" data-v="${o.v}">${o.l}</div>`).join('');
      // ボタン位置に合わせて表示
      const r=btn.getBoundingClientRect();
      menu.style.top=(r.bottom+4)+'px';
      menu.style.left=Math.min(r.left, window.innerWidth-160)+'px';
      document.body.appendChild(menu);
      flashMenuEl=menu;
      menu.querySelectorAll('.flash-place-item').forEach(item=>{
        item.addEventListener('click',()=>{
          set.flashSettings[id]=item.dataset.v;
          saveSets(); closeFlashMenu(); renderMyset();
        });
      });
    });
  });
  document.addEventListener('click', closeFlashMenu);

  pane.querySelectorAll('.ability-info-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const a=abilities.find(x=>x.id===+btn.dataset.id); if(!a) return;
      // ベース名（末尾 I/II/III/IV を除去）
      const base=a.name.replace(/ I$|\/II$| II$| III$| IV$/, '').replace(/ I$| II$| III$| IV$/,'');
      const baseName=a.name.replace(/ (I|II|III|IV)$/, '');
      // 同カード・同ベース名の能力を番号順で取得
      const related=abilities.filter(x=>x.card===a.card &&
        x.name.replace(/ (I|II|III|IV)$/,'')===baseName
      ).sort((x,y)=>x.id-y.id);
      const nameEl=document.getElementById('ability-desc-name');
      const textEl=document.getElementById('ability-desc-text');
      if(related.length<=1){
        nameEl.textContent=a.name;
        textEl.innerHTML=descHtml(a.desc);
      } else {
        nameEl.textContent=baseName;
        textEl.innerHTML=related.map(r=>`
          <div style="margin-bottom:12px">
            <div style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:12px;
              color:${/ (II|IV)$/.test(r.name)?'#ffd54f':'#d0cce8'};margin-bottom:4px">${esc(r.name)}</div>
            <div style="font-size:12px;line-height:1.8;color:var(--tx)">${descHtml(r.desc)}</div>
          </div>`).join('<hr style="border:none;border-top:1px solid var(--bd);margin:8px 0">');
      }
      document.getElementById('ability-desc-popup').classList.add('open');
    });
  });
  pane.querySelectorAll('.myset-remove-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=+btn.dataset.id;
      const idx=set.items.indexOf(id);
      if(idx>=0) set.items.splice(idx,1);
      // 対応する編成枠もクリア
      if(set.deck){
        const a=abilities.find(x=>x.id===id);
        if(a){
          const remaining=set.items.filter(i=>{ const x=abilities.find(y=>y.id===i); return x&&x.card===a.card; });
          if(remaining.length===0){
            set.deck.own=set.deck.own.map(c=>c===a.card?null:c);
            if(set.deck.rental===a.card) set.deck.rental=null;
          }
        }
      }
      saveSets(); renderMyset(); render();
    });
  });
}

function openCardPicker(cards, set, slotKey, isRental){
  const overlay=document.getElementById('card-picker-overlay');
  const titleEl=document.getElementById('card-picker-title');
  const listEl=document.getElementById('card-picker-list');
  const isRentalSlot=slotKey==='rental';
  titleEl.textContent=isRentalSlot?'レンタル枠のカードを選択':`自前${+slotKey+1}枠のカードを選択`;

  const currentCard=isRentalSlot?set.deck.rental:set.deck.own[+slotKey];
  // 既に他の枠に入っているカード（同じ枠は除く）
  const usedCards=new Set([...set.deck.own, set.deck.rental].filter(Boolean));
  if(currentCard) usedCards.delete(currentCard);

  listEl.innerHTML=
    `<div class="card-picker-clear" id="picker-clear">✕ 枠をクリア</div>`+
    cards.map(card=>{
      const own=ownedCards.has(card);
      const disabled=usedCards.has(card);
      const sel=card===currentCard;
      return `<div class="card-picker-item${sel?' selected':''}${disabled?' disabled':''}" data-card="${esc(card)}" style="${disabled?'opacity:.35;pointer-events:none':''}">
        <span>${own?'✅':'📛'}</span>
        <span class="card-picker-name">${esc(card)}</span>
        ${own?'<span class="card-picker-cnt" style="color:#43a047">所持済</span>':''}
        ${sel?'<span style="color:#f9a825;font-size:11px">選択中</span>':''}
      </div>`;
    }).join('');

  overlay.classList.add('open');
  listEl.querySelector('#picker-clear').addEventListener('click',()=>{
    if(isRentalSlot) set.deck.rental=null; else set.deck.own[+slotKey]=null;
    saveSets(); overlay.classList.remove('open'); renderMyset();
  });
  listEl.querySelectorAll('.card-picker-item:not(.disabled)').forEach(el=>{
    el.addEventListener('click',()=>{
      const card=el.dataset.card;
      if(!isRentalSlot && !ownedCards.has(card)){
        showWarn(`「${card}」は未所持のカードです。自前枠に設定しますか？`, ()=>{
          set.deck.own[+slotKey]=card;
          saveSets(); overlay.classList.remove('open'); renderMyset();
        });
        return;
      }
      if(isRentalSlot) set.deck.rental=card; else set.deck.own[+slotKey]=card;
      saveSets(); overlay.classList.remove('open'); renderMyset();
    });
  });
}

// ===== DATA EXPORT / IMPORT =====
function exportData(){
  const data = {
    v: 1,
    owned: [...ownedCards],
    sets: mySets
  };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function importData(str){
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(str.trim()))));
    if(!data || data.v !== 1) throw new Error('invalid');
    ownedCards = new Set(data.owned || []);
    mySets = data.sets || [];
    activeSetId = mySets.length ? mySets[0].id : null;
    saveOwned(); saveSets();
    render(); renderOwned(); updateSbarMyset();
    if(activePage==='myset') renderMyset();
    return true;
  } catch(e) {
    return false;
  }
}

    'クリティカル':'クリティカル','必中':'必中','ガッツ変化系':'ガッツ変化系','無効化':'無効','回避':'完全回避','命中強化':'命中強化'
  };

  bar.innerHTML=[...activeCbs].map(f=>`<span class="active-fbadge">${labels[f]||f}<button class="active-fbadge-x" data-f="${f}">×</button></span>`).join('');

document.getElementById('page-db').addEventListener('click', e=>{
  const chk=e.target.closest('.card-check');
  if(!chk) return;
  e.stopPropagation(); e.preventDefault();
  const id=+chk.dataset.chk;
  const s=getActiveSet();
  if(!s){ openSetModal(); return; }
  const idx=s.items.indexOf(id);
  if(idx>=0){
    s.items.splice(idx,1);
    if(s.flashSettings) delete s.flashSettings[id];
    saveSets();
    chk.classList.remove('in'); chk.textContent='';
    updateSbarMyset();
    return;
  }
  const a=abilities.find(x=>x.id===id);
  if(!a) return;
  // 同名の能力が他カードにもあるか確認
  const sameNameAbilities=abilities.filter(x=>x.name===a.name);
  if(sameNameAbilities.length>1){
    openCardSelectModal(sameNameAbilities, chk, s);
  } else if(a.source==='閃き'){
    openFlashPlaceModal(id, chk, s, null);
  } else if(a.name.startsWith('超')){
    openCardSelectModal([a], chk, s);
  } else {
    addToSet(id, chk, s, null);
  }
}, true);

function addToSet(id, chk, s, place){
  s.items.push(id);
  if(place){ if(!s.flashSettings) s.flashSettings={}; s.flashSettings[id]=place; }
  saveSets();
  chk.classList.add('in'); chk.textContent='✓';
  updateSbarMyset();
}

function openCardSelectModal(candidates, chk, s){
  const overlay=document.getElementById('card-sel-overlay');
  const title=document.getElementById('card-sel-title');
  const list=document.getElementById('card-sel-list');
  const isFlash=candidates[0].source==='閃き';
  title.textContent=`「${candidates[0].name}」— カードを選択`;
  list.innerHTML='';
  candidates.forEach(a=>{
    const own=ownedCards.has(a.card);
    const item=document.createElement('div');
    item.className='card-sel-item';
    if(isFlash){
      item.innerHTML=`<div class="card-sel-card-name">${own?'✅':'📛'} ${esc(a.card)}</div>
        <div class="card-sel-place-row">
          <button class="card-sel-place-btn deck-btn" data-id="${a.id}" data-place="deck">📋 編成カードの能力</button>
          <button class="card-sel-place-btn flash-btn" data-id="${a.id}" data-place="flash">💡 ロード閃き枠</button>
          <button class="card-sel-place-btn both-btn" data-id="${a.id}" data-place="both">📋💡 両方</button>
        </div>`;
      item.querySelectorAll('.card-sel-place-btn').forEach(btn=>{
        btn.addEventListener('click',ev=>{
          ev.stopPropagation();
          addToSet(+btn.dataset.id, chk, s, btn.dataset.place);
          overlay.classList.remove('open');
        });
      });
    } else {
      item.innerHTML=`<button class="card-sel-plain-btn" data-id="${a.id}">${own?'✅':'📛'} ${esc(a.card)}</button>`;
      item.querySelector('.card-sel-plain-btn').addEventListener('click',ev=>{
        ev.stopPropagation();
        addToSet(+ev.currentTarget.dataset.id, chk, s, null);
        overlay.classList.remove('open');
      });
    }
    list.appendChild(item);
  });
  overlay.classList.add('open');
}

function openFlashPlaceModal(id, chk, s, _unused){
  const existing=document.getElementById('flash-add-menu');
  if(existing) existing.remove();
  const menu=document.createElement('div');
  menu.id='flash-add-menu';
  menu.className='flash-place-menu';
  menu.innerHTML=
    '<div style="padding:8px 14px 6px;font-size:10px;color:var(--ts);font-weight:700;border-bottom:1px solid var(--bd)">どこに追加しますか？</div>'+
    [['deck','📋 編成カードの能力'],['flash','💡 ロード閃き枠'],['both','📋💡 両方に表示']]
      .map(([v,l])=>`<div class="flash-place-item" data-v="${v}">${l}</div>`).join('');
  const r=chk.getBoundingClientRect();
  document.body.appendChild(menu);
  const mh=menu.offsetHeight||120;
  const top=r.bottom+4+mh>window.innerHeight ? r.top-mh-4 : r.bottom+4;
  menu.style.top=Math.max(4,top)+'px';
  menu.style.left=Math.min(r.left, window.innerWidth-180)+'px';
  const cleanup=()=>{ const m=document.getElementById('flash-add-menu'); if(m) m.remove(); document.removeEventListener('click',cleanup); };
  setTimeout(()=>document.addEventListener('click',cleanup),0);
  menu.querySelectorAll('.flash-place-item').forEach(item=>{
    item.addEventListener('click',ev=>{
      ev.stopPropagation();
      addToSet(id, chk, s, item.dataset.v);
      cleanup();
    });
  });
}
